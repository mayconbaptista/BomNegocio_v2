version: '3.4'

services:

    bom_negocio.db:
        image: postgres:16.4
        hostname: bom_negocio_db
        container_name: bn_db
        profiles: ["vs_debug", "db"]

    auth.webapi:
        image: ${DOCKER_REGISTRY-}authwebapi
        hostname: auth.api
        container_name: auth.api
        build:
            context: .
            dockerfile: Auth.WebApi/Dockerfile
        depends_on:
            - bom_negocio.db
        profiles: ["vs_debug", "auth"]

    getway.webapi:
        image: ${DOCKER_REGISTRY-}getwaywebapi
        hostname: getway
        container_name: getway
        build:
            context: .
            dockerfile: Getway.WebApi/Dockerfile
        depends_on:
            - auth.webapi
            - cart.webapi
            - catalog.api
            - order.webapi
        profiles: ["vs_debug", "gateway"]

    order.webapi:
        image: ${DOCKER_REGISTRY-}orderwebapi
        hostname: order.api
        container_name: order.api
        build:
            context: .
            dockerfile: Order.WebApi/Dockerfile
        depends_on:
            - bom_negocio.db
            - localstack
        profiles: ["vs_debug", "order"] 

    cart.webapi:
        image: ${DOCKER_REGISTRY-}cartwebapi
        hostname: cart.api
        container_name: cart.api
        build:
            context: .
            dockerfile: Cart.WebApi/Dockerfile
        depends_on:
            - bom_negocio.db
            - localstack
        profiles: ["vs_debug", "cart"]

    catalog.api:
        image: ${DOCKER_REGISTRY-}catalogapi
        hostname: catalog.api
        container_name: catalog.api
        build:
            context: .
            dockerfile: Catalog.Api/Dockerfile
        depends_on:
            - bom_negocio.db
            - localstack
        profiles: ["vs_debug", "catalog"]

    localstack:
        image: localstack/localstack:stable
        container_name: "${LOCALSTACK_DOCKER_NAME:-localstack-bn}"
        volumes:
          - "${LOCALSTACK_VOLUME_DIR:-./localstack}:/var/lib/localstack"
          - "/var/run/docker.sock:/var/run/docker.sock"
          - "./scripts/localstack:/etc/localstack/init/ready.d"
        profiles: ["vs_debug"]
