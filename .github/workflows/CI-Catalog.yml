name: CI para Catalog.API

on:
  pull_request:
    branches: [ "*" ]
    paths:
      - 'Catalog.Api/**'
  push:
    branches: [ "*" ]
    paths:
      - 'Catalog.Api/**' # Otimizaçăo para rodar apenas quando este serviço for alterado

jobs:
  build:
    runs-on: ubuntu-latest # O pipeline vai rodar em uma máquina virtual Linux

    steps:
    # 1. Baixar o código do repositório
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. Configurar o ambiente .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x # Use a versăo do seu projeto

    - name: Restore denpendencias
      run: dotnet restore Catalog.Api/

    - name: Build
      run: dotnet build Catalog.Api/
