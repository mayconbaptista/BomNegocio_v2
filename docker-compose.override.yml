# refs: https://docs.docker.com/compose/extends/
# https://docs.docker.com/compose/compose-file/compose-file-v3/
# https://docs.docker.com/guides/dotnet/develop/

# version: '3.4'

x-app-envs: &app-envs
  ASPNETCORE_ENVIRONMENT: Development
  ASPNETCORE_HTTP_PORTS: 8080
  ASPNETCORE_HTTPS_PORTS: 8081

x-app-aws-envs: &app-aws-envs
  AWS_REGION: us-east-1
  AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
  AWS_SECRET_ACCESS_KEY: wJalrXUtn

services:

    bom_negocio.db:
        environment:
            POSTGRES_DB: catalog
            POSTGRES_USER: catalog
            POSTGRES_PASSWORD: catalog123
        ports:
            - "5432:5432"
            - "5433:5433"
        healthcheck:
            test: ["CMD", "pg_isready"]
            interval: 10s
            timeout: 5s
            retries: 5
        volumes:
            - db-data:/var/lib/postgresql/data

    auth.webapi:
        environment:
            << : *app-envs
            ASPNETCORE_Kestrel__Certificates__Default__Path: /https/aspnetapp.pfx
            ASPNETCORE_Kestrel__Certificates__Default__Password: 123456 
        ports:
            - "8235:8080"
            - "8236:8081"
        volumes:
            - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
            - ~/.aspnet/https:/https:ro
            - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
        depends_on:
            bom_negocio.db:
                condition: service_healthy

    getway.webapi:
        environment:
            <<: *app-envs
        ports:
            - "8080:8080"
            - "8081:8081"
            - "5010:5000" 
        volumes:
            - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
            - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

    order.webapi:
        environment:
            <<: [*app-envs, *app-aws-envs]
            EFI__CertificatePath: /home/app/.certs/efi-homologacao-883595.p12
            EFI__CertificatePassword:
        ports:
            - "8888:8080"
            - "8881:8081"
        volumes:
            - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
            #- ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
            - ${APPDATA}/EfiCertificates/efi-homologacao-883595.p12:/home/app/.certs/efi-homologacao-883595.p12:ro
            - ~/.aspnet/https:/https:ro
        depends_on:
            bom_negocio.db:
                condition: service_healthy

    cart.webapi:
        environment:
            <<: [*app-envs, *app-aws-envs]
        ports:
            - "8087:8080"
            - "8088:8081"
            - "5002:5000"
            - "5003:5001"
        volumes:
            - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
            - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
        depends_on:
            bom_negocio.db:
                condition: service_healthy
         
    catalog.api:
        environment:
            <<: [*app-envs, *app-aws-envs]
        ports:
            - "8989:8080"
            - "8181:8081"
        volumes:
            - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
            - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

    localstack:
        ports:
          # "127.0.0.1:4566:4566"            # LocalStack Gateway
          # "127.0.0.1:4510-4559:4510-4559"  # external services port range
          - "4566:4566"            # LocalStack Gateway
          - "4510-4559:4510-4559"  # external services port range
        environment:
          << : *app-aws-envs
          # LocalStack configuration: https://docs.localstack.cloud/references/configuration/
          DEBUG: ${DEBUG:-1}
          SERVICES: s3,sqs,sns
          LOCALSTACK_HOST: localhost.localstack.cloud:4566
          AWS_DEFAULT_OUTPUT: json
          DISABLE_CORS_CHECK: 1
          EXTRA_CORS_ALLOWED_ORIGINS: "https://app.localstack.cloud"
          LOCALSTACK_AUTH_TOKEN: ls-TulAdasu-1920-LunI-8608-KUNeludEa3d9
        volumes:
          - "${LOCALSTACK_VOLUME_DIR:-./localstack}:/var/lib/localstack"
          - "/var/run/docker.sock:/var/run/docker.sock"
          - "./scripts/localstack:/etc/localstack/init/ready.d"
        profiles: ["vs_debug"]
        
volumes:
    db-data:

